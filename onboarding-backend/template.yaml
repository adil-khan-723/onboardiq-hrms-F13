# ─────────────────────────────────────────────
# CLOUDWATCH DASHBOARD
# ─────────────────────────────────────────────

  OnboardingDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: hrms-onboarding-observability
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Invocations — All Functions",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-create-employee", {"label": "CreateEmployee"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-progress-api", {"label": "ProgressApi"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-stage-document-collection", {"label": "DocCollection"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-stage-it-provisioning", {"label": "ITProvisioning"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-stage-policy-signoff", {"label": "PolicySignoff"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-stage-manager-intro", {"label": "ManagerIntro"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-send-reminder", {"label": "Reminder"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-document-upload-trigger", {"label": "UploadTrigger"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-document-upload-url", {"label": "UploadUrl"}],
                  ["AWS/Lambda", "Invocations", "FunctionName", "hrms-alarm-simulation", {"label": "AlarmSim"}]
                ],
                "period": 60,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Errors — All Functions",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-create-employee", {"label": "CreateEmployee", "color": "#d62728"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-progress-api", {"label": "ProgressApi", "color": "#ff7f0e"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-stage-document-collection", {"label": "DocCollection", "color": "#9467bd"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-stage-it-provisioning", {"label": "ITProvisioning", "color": "#8c564b"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-stage-policy-signoff", {"label": "PolicySignoff", "color": "#e377c2"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-stage-manager-intro", {"label": "ManagerIntro", "color": "#bcbd22"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-send-reminder", {"label": "Reminder", "color": "#17becf"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-document-upload-trigger", {"label": "UploadTrigger", "color": "#1f77b4"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-document-upload-url", {"label": "UploadUrl", "color": "#2ca02c"}],
                  ["AWS/Lambda", "Errors", "FunctionName", "hrms-alarm-simulation", {"label": "AlarmSim", "color": "#ff0000"}]
                ],
                "period": 60,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Lambda Duration p99 — All Functions",
                "view": "timeSeries",
                "stacked": false,
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "hrms-create-employee", {"stat": "p99", "label": "CreateEmployee"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "hrms-progress-api", {"stat": "p99", "label": "ProgressApi"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "hrms-stage-document-collection", {"stat": "p99", "label": "DocCollection"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "hrms-stage-it-provisioning", {"stat": "p99", "label": "ITProvisioning"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "hrms-stage-policy-signoff", {"stat": "p99", "label": "PolicySignoff"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "hrms-stage-manager-intro", {"stat": "p99", "label": "ManagerIntro"}]
                ],
                "period": 60,
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "alarm",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Active Alarms",
                "alarms": [
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:hrms-create-employee-error-rate",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:hrms-create-employee-duration",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:hrms-progress-api-error-rate",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:hrms-progress-api-duration",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:hrms-doc-collection-error-rate",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:hrms-it-provisioning-error-rate",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:hrms-policy-signoff-error-rate",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:hrms-manager-intro-error-rate",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:hrms-alarm-simulation-error-rate"
                ]
              }
            }
          ]
        }

# ─────────────────────────────────────────────
# OUTPUTS
# ─────────────────────────────────────────────

Outputs:
  ApiBaseUrl:
    Description: API Gateway base URL
    Value: !Sub https://${OnboardingApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: hrms-onboarding-api-url

  DocumentBucketName:
    Description: S3 bucket for documents
    Value: !Ref DocumentBucket
    Export:
      Name: hrms-document-bucket

  CognitoUserPoolId:
    Description: Cognito User Pool ID
    Value: !Ref EmployeeCognitoUserPool
    Export:
      Name: hrms-cognito-user-pool-id

  CognitoClientId:
    Description: Cognito App Client ID
    Value: !Ref EmployeeCognitoUserPoolClient
    Export:
      Name: hrms-cognito-client-id

  StateMachineArn:
    Description: Step Functions State Machine ARN
    Value: !Ref OnboardingStateMachine
    Export:
      Name: hrms-state-machine-arn

  HRNotificationTopicArn:
    Description: SNS Topic ARN for HR notifications
    Value: !Ref HRNotificationTopic
    Export:
      Name: hrms-hr-notification-topic
