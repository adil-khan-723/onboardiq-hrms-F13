AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Smart Employee Onboarding & Identity Service - HRMS Project 4

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 30
    MemorySize: 256
    Tracing: Active
    Environment:
      Variables:
        EMPLOYEE_TABLE: !Ref EmployeeTable
        WORKFLOW_TABLE: !Ref OnboardingWorkflowTable
        STAGE_TABLE: !Ref OnboardingStageTable
        DOCUMENT_TABLE: !Ref DocumentTable
        DOCUMENT_BUCKET: !Sub hrms-onboarding-documents-${AWS::AccountId}-${Environment}
        SES_FROM_EMAIL: !Ref SESFromEmail
        HR_EMAIL: !Ref HREmail
        SNS_TOPIC_ARN: !Ref HRNotificationTopic
        USER_POOL_ID: !Ref EmployeeCognitoUserPool
        USER_POOL_CLIENT_ID: !Ref EmployeeCognitoUserPoolClient
        REGION: !Ref AWS::Region
        FRONTEND_URL: !Ref FrontendUrl
    Layers:
      - !Ref CommonLayer

# NOTE: STATE_MACHINE_ARN is NOT in Globals — only on CreateEmployeeFunction.
# Putting it in Globals would create: Lambdas → StateMachine → Lambdas (circular).

Parameters:
  SESFromEmail:
    Type: String
    Description: Verified SES sender email address
    Default: onboarding@yourcompany.com

  HREmail:
    Type: String
    Description: HR admin email for SNS notifications
    Default: hr@yourcompany.com

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  FrontendUrl:
    Type: String
    Description: Public URL of the frontend S3 website
    Default: https://hrms-onboarding-frontend-dev.s3-website.ap-south-1.amazonaws.com

# ─────────────────────────────────────────────
# SHARED LAYER
# ─────────────────────────────────────────────
Resources:

  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: hrms-onboarding-common
      ContentUri: layers/common/
      CompatibleRuntimes: [nodejs20.x]
      RetentionPolicy: Delete

# ─────────────────────────────────────────────
# DYNAMODB TABLES
# ─────────────────────────────────────────────

  EmployeeTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hrms-employees
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: employee_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: department
          AttributeType: S
      KeySchema:
        - AttributeName: employee_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: department-index
          KeySchema:
            - AttributeName: department
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: hrms-onboarding

  OnboardingWorkflowTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hrms-onboarding-workflows
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: workflow_id
          AttributeType: S
        - AttributeName: employee_id
          AttributeType: S
      KeySchema:
        - AttributeName: workflow_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: employee-index
          KeySchema:
            - AttributeName: employee_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: hrms-onboarding

  OnboardingStageTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hrms-onboarding-stages
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: stage_id
          AttributeType: S
        - AttributeName: workflow_id
          AttributeType: S
      KeySchema:
        - AttributeName: stage_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: workflow-index
          KeySchema:
            - AttributeName: workflow_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: hrms-onboarding

  DocumentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hrms-documents
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: employee_id
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: employee-index
          KeySchema:
            - AttributeName: employee_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: hrms-onboarding

# ─────────────────────────────────────────────
# S3 BUCKET — No NotificationConfiguration here!
# Notification is wired AFTER via custom resource
# to avoid circular dep with DocumentUploadTriggerFunction
# ─────────────────────────────────────────────

  DocumentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub hrms-onboarding-documents-${AWS::AccountId}-${Environment}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']
            MaxAge: 3600
      Tags:
        - Key: Project
          Value: hrms-onboarding

  DocumentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    DependsOn: DocumentBucket
    Properties:
      Bucket: !Ref DocumentBucket
      PolicyDocument:
        Statement:
          - Sid: DenyNonSSL
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub arn:aws:s3:::hrms-onboarding-documents-${AWS::AccountId}-${Environment}
              - !Sub arn:aws:s3:::hrms-onboarding-documents-${AWS::AccountId}-${Environment}/*
            Condition:
              Bool:
                aws:SecureTransport: false

# ─────────────────────────────────────────────
# COGNITO USER POOL
# ─────────────────────────────────────────────

  EmployeeCognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: hrms-employee-pool
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailMessage: |
            Welcome to the company! Your temporary login credentials:
            Username: {username}
            Temporary Password: {####}
            Please log in and change your password immediately.
          EmailSubject: "Your OnboardIQ login credentials"
      Schema:
        - Name: employee_id
          AttributeDataType: String
          Mutable: false
        - Name: department
          AttributeDataType: String
          Mutable: true
        - Name: role
          AttributeDataType: String
          Mutable: true
      UserPoolTags:
        Project: hrms-onboarding

  EmployeeCognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: hrms-onboarding-client
      UserPoolId: !Ref EmployeeCognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      AccessTokenValidity: 8
      IdTokenValidity: 8
      RefreshTokenValidity: 30

# ─────────────────────────────────────────────
# SNS TOPIC
# ─────────────────────────────────────────────

  HRNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: hrms-hr-notifications
      Subscription:
        - Protocol: email
          Endpoint: !Ref HREmail
      Tags:
        - Key: Project
          Value: hrms-onboarding

# ─────────────────────────────────────────────
# API GATEWAY
# ─────────────────────────────────────────────

  OnboardingApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: hrms-onboarding-api
      StageName: !Ref Environment
      Cors:
        AllowMethods: "'GET,POST,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt EmployeeCognitoUserPool.Arn
      Tags:
        Project: hrms-onboarding

# ─────────────────────────────────────────────
# STAGE LAMBDAS — defined BEFORE StateMachine
# ─────────────────────────────────────────────

  StageDocumentCollectionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-stage-document-collection
      CodeUri: functions/document-collection/
      Handler: index.stage
      Description: Step Functions task — Document Collection stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingStageTable
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentTable
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'

  StageITProvisioningFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-stage-it-provisioning
      CodeUri: functions/it-provisioning/
      Handler: index.handler
      Description: Step Functions task — IT Provisioning stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingStageTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EmployeeTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:AdminGetUser
              Resource: !GetAtt EmployeeCognitoUserPool.Arn
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'

  StagePolicySignoffFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-stage-policy-signoff
      CodeUri: functions/policy-signoff/
      Handler: index.handler
      Description: Step Functions task — Policy Sign-off stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingStageTable
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'

  StageManagerIntroFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-stage-manager-intro
      CodeUri: functions/manager-intro/
      Handler: index.handler
      Description: Step Functions task — Manager Intro stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingStageTable
        - DynamoDBCrudPolicy:
            TableName: !Ref EmployeeTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingWorkflowTable
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'

  ReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-send-reminder
      CodeUri: functions/reminder/
      Handler: index.handler
      Description: Sends reminder email to employee for incomplete stage
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingStageTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingWorkflowTable
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'

# ─────────────────────────────────────────────
# STEP FUNCTIONS — defined AFTER stage Lambdas
# ─────────────────────────────────────────────

  StepFunctionsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: hrms-stepfunctions-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambdas
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt StageDocumentCollectionFunction.Arn
                  - !GetAtt StageITProvisioningFunction.Arn
                  - !GetAtt StagePolicySignoffFunction.Arn
                  - !GetAtt StageManagerIntroFunction.Arn
                  - !GetAtt ReminderFunction.Arn

  OnboardingStateMachine:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: hrms-onboarding-workflow
      DefinitionUri: statemachine/onboarding.asl.json
      DefinitionSubstitutions:
        StageDocumentCollectionArn: !GetAtt StageDocumentCollectionFunction.Arn
        StageITProvisioningArn: !GetAtt StageITProvisioningFunction.Arn
        StagePolicySignoffArn: !GetAtt StagePolicySignoffFunction.Arn
        StageManagerIntroArn: !GetAtt StageManagerIntroFunction.Arn
        ReminderArn: !GetAtt ReminderFunction.Arn
      Role: !GetAtt StepFunctionsRole.Arn
      Tags:
        Project: hrms-onboarding

# ─────────────────────────────────────────────
# API LAMBDAS — CreateEmployee needs StateMachine ARN
# so defined AFTER OnboardingStateMachine
# ─────────────────────────────────────────────

  CreateEmployeeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-create-employee
      CodeUri: functions/create-employee/
      Handler: index.handler
      Description: Creates employee record in DynamoDB, provisions Cognito user, starts Step Functions
      Environment:
        Variables:
          STATE_MACHINE_ARN: !Ref OnboardingStateMachine
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EmployeeTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingWorkflowTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingStageTable
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminCreateUser
                - cognito-idp:AdminSetUserPassword
              Resource: !GetAtt EmployeeCognitoUserPool.Arn
            - Effect: Allow
              Action: states:StartExecution
              Resource: !Ref OnboardingStateMachine
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'
      Events:
        CreateEmployee:
          Type: Api
          Properties:
            RestApiId: !Ref OnboardingApi
            Path: /employees
            Method: POST
            Auth:
              Authorizer: NONE

  ProgressApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-progress-api
      CodeUri: functions/progress-api/
      Handler: index.handler
      Description: Returns onboarding progress for an employee
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref EmployeeTable
        - DynamoDBReadPolicy:
            TableName: !Ref OnboardingWorkflowTable
        - DynamoDBReadPolicy:
            TableName: !Ref OnboardingStageTable
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingStageTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingWorkflowTable
        - Statement:
            - Effect: Allow
              Action: dynamodb:Scan
              Resource:
                - !GetAtt EmployeeTable.Arn
                - !GetAtt OnboardingWorkflowTable.Arn
                - !GetAtt OnboardingStageTable.Arn
                - !GetAtt DocumentTable.Arn
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'
      Events:
        GetProgress:
          Type: Api
          Properties:
            RestApiId: !Ref OnboardingApi
            Path: /employees/{employeeId}/progress
            Method: GET
            Auth:
              Authorizer: NONE
        ListEmployees:
          Type: Api
          Properties:
            RestApiId: !Ref OnboardingApi
            Path: /employees
            Method: GET
            Auth:
              Authorizer: NONE
        PolicySignoff:
          Type: Api
          Properties:
            RestApiId: !Ref OnboardingApi
            Path: /employees/{employeeId}/policy-signoff
            Method: PUT
            Auth:
              Authorizer: NONE

  DocumentUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-document-upload-url
      CodeUri: functions/document-collection/
      Handler: index.handler
      Description: Generates presigned S3 URL for secure document upload
      Policies:
        - S3WritePolicy:
            BucketName: !Sub hrms-onboarding-documents-${AWS::AccountId}-${Environment}
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentTable
        - Statement:
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'
      Events:
        GetUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref OnboardingApi
            Path: /employees/{employeeId}/documents/upload-url
            Method: POST
            Auth:
              Authorizer: NONE

  DocumentUploadTriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-document-upload-trigger
      CodeUri: functions/document-upload-trigger/
      Handler: index.handler
      Description: Triggered by S3 — validates file, updates DynamoDB, sends SNS if all docs received
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub hrms-onboarding-documents-${AWS::AccountId}-${Environment}
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OnboardingStageTable
        - DynamoDBReadPolicy:
            TableName: !Ref EmployeeTable
        - DynamoDBReadPolicy:
            TableName: !Ref OnboardingWorkflowTable
        - Statement:
            - Effect: Allow
              Action: sns:Publish
              Resource: !Ref HRNotificationTopic
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/*
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'

  DocumentUploadTriggerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DocumentUploadTriggerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::hrms-onboarding-documents-${AWS::AccountId}-${Environment}

# ─────────────────────────────────────────────
# CUSTOM RESOURCE — Wire S3 → Lambda notification
# Runs AFTER both DocumentBucket and
# DocumentUploadTriggerFunction exist
# ─────────────────────────────────────────────

  S3NotificationSetupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-s3-notification-setup
      CodeUri: functions/s3-notification-setup/
      Handler: index.handler
      Runtime: nodejs20.x
      Timeout: 60
      Policies:
        - Statement:
            - Effect: Allow
              Action: s3:PutBucketNotification
              Resource: !Sub arn:aws:s3:::hrms-onboarding-documents-${AWS::AccountId}-${Environment}

  S3NotificationCustomResource:
    Type: Custom::S3Notification
    DependsOn:
      - DocumentBucket
      - DocumentUploadTriggerFunction
      - DocumentUploadTriggerPermission
    Properties:
      ServiceToken: !GetAtt S3NotificationSetupFunction.Arn
      BucketName: !Ref DocumentBucket
      LambdaArn: !GetAtt DocumentUploadTriggerFunction.Arn

# ─────────────────────────────────────────────
# ALARM SIMULATION — deliberate error for demo
# ─────────────────────────────────────────────

  AlarmSimulationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hrms-alarm-simulation
      CodeUri: functions/alarm-simulation/
      Handler: index.handler
      Description: Deliberately throws errors to trigger CloudWatch alarms (demo only)
      Policies:
        - Statement:
            - Effect: Allow
              Action: [xray:PutTraceSegments, xray:PutTelemetryRecords]
              Resource: '*'

# ─────────────────────────────────────────────
# CLOUDWATCH ALARMS — error rate + duration
# ─────────────────────────────────────────────

  AlarmCreateEmployeeErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-create-employee-error-rate
      AlarmDescription: CreateEmployee error rate exceeded 5%
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref CreateEmployeeFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmCreateEmployeeDuration:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-create-employee-duration
      AlarmDescription: CreateEmployee p99 duration exceeded 3s
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref CreateEmployeeFunction
      ExtendedStatistic: p99
      Period: 60
      EvaluationPeriods: 1
      Threshold: 3000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmProgressApiErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-progress-api-error-rate
      AlarmDescription: ProgressApi error rate exceeded 5%
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ProgressApiFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmProgressApiDuration:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-progress-api-duration
      AlarmDescription: ProgressApi p99 duration exceeded 3s
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref ProgressApiFunction
      ExtendedStatistic: p99
      Period: 60
      EvaluationPeriods: 1
      Threshold: 3000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmDocCollectionErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-doc-collection-error-rate
      AlarmDescription: DocumentCollection error rate exceeded 5%
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref StageDocumentCollectionFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmDocCollectionDuration:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-doc-collection-duration
      AlarmDescription: DocumentCollection p99 duration exceeded 3s
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref StageDocumentCollectionFunction
      ExtendedStatistic: p99
      Period: 60
      EvaluationPeriods: 1
      Threshold: 3000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmITProvisioningErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-it-provisioning-error-rate
      AlarmDescription: ITProvisioning error rate exceeded 5%
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref StageITProvisioningFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmITProvisioningDuration:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-it-provisioning-duration
      AlarmDescription: ITProvisioning p99 duration exceeded 3s
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref StageITProvisioningFunction
      ExtendedStatistic: p99
      Period: 60
      EvaluationPeriods: 1
      Threshold: 3000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmPolicySignoffErrors:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-policy-signoff-error-rate
      AlarmDescription: PolicySignoff error rate exceeded 5%
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref StagePolicySignoffFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmPolicySignoffDuration:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: hrms-policy-signoff-duration
      AlarmDescription: PolicySignoff p99 duration exceeded 3s
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref StagePolicySignoffFunction
      ExtendedStatistic: p99
      Period: 60
      EvaluationPeriods: 1
      Threshold: 3000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref HRNotificationTopic

  AlarmManagerIntroErrors:
